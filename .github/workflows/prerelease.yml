name: Prerelease

on:
  push:
    branches:
      - main

jobs:
  prerelease:
    timeout-minutes: 10
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Modify package.json version
        run: npx tsx .github/version-script.ts

      - name: Resolve workspace dependencies
        run: npx tsx .github/resolve-workspace-versions.ts

      - name: Build project
        run: npm run build --if-present

      - name: Type check
        run: npm run check --if-present

      - name: Run tests
        run: npm test
        env:
          CI: true

      - name: Publish agents package (beta)
        run: npm publish --tag beta
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        working-directory: packages/agents

      - name: Publish hono-agents package (beta)
        run: npm publish --tag beta
        env:
          NPM_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}
        working-directory: packages/hono-agents
