name: Publish to pkg.pr.new for pre-release

on:
  pull_request:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build packages
        run: npm run build --if-present

      - name: Check workspace dependencies
        run: npx tsx .github/resolve-workspace-versions.ts

      - name: Publish agents package to pkg.pr.new
        run: npx pkg-pr-new publish ./packages/agents

      - name: Publish hono-agents package to pkg.pr.new
        run: npx pkg-pr-new publish ./packages/hono-agents
